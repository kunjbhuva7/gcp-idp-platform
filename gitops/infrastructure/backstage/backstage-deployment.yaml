apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backstage
  template:
    metadata:
      labels:
        app: backstage
    spec:
      containers:
        - name: backstage
          image: ghcr.io/backstage/backstage:latest
          ports:
            - containerPort: 7007
          command:
            - node
          args:
            - packages/backend
            - --config
            - app-config.yaml
          env:
            - name: APP_CONFIG_app_baseUrl
              value: http://34.136.85.24
            - name: APP_CONFIG_backend_baseUrl
              value: http://34.136.85.24
          resources:
            limits:
              cpu: "500m"
              memory: "1Gi"
            requests:
              cpu: "250m"
              memory: "512Mi"
