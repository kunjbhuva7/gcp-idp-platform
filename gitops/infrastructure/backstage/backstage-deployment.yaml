apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backstage
  template:
    metadata:
      labels:
        app: backstage
    spec:
      containers:
        - name: backstage
          image: ghcr.io/backstage/backstage:latest
          ports:
            - containerPort: 7007
          command:
            - sh
            - -c
          args:
            - |
              node -e 'const fs = require("fs"); const file = "packages/app/dist/index.html"; let html = fs.readFileSync(file, "utf8"); if (!html.includes("crypto.randomUUID")) { html = html.replace("<head>", "<head><script>if(!globalThis.crypto)globalThis.crypto={};if(!globalThis.crypto.randomUUID)globalThis.crypto.randomUUID=function(){return\"xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx\".replace(/[xy]/g,function(c){var r=Math.random()*16|0,v=c==\"x\"?r:(r&0x3|0x8);return v.toString(16)})};</script>"); fs.writeFileSync(file, html, "utf8"); }'
              node packages/backend --config app-config.yaml
          env:
            - name: APP_CONFIG_app_baseUrl
              value: http://34.136.85.24
            - name: APP_CONFIG_backend_baseUrl
              value: http://34.136.85.24
            - name: APP_CONFIG_backend_csp_upgradeInsecureRequests
              value: "false"
            - name: APP_CONFIG_permission_enabled
              value: "false"
            - name: APP_CONFIG_backend_auth_dangerouslyDisableDefaultAuthPolicy
              value: "true"
            - name: APP_CONFIG_backend_reading_allow
              value: '[{"host":"raw.githubusercontent.com"},{"host":"github.com"}]'
          resources:
            limits:
              cpu: "500m"
              memory: "1Gi"
            requests:
              cpu: "250m"
              memory: "512Mi"
