apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-secret-sync
  namespace: default
spec:
  refreshInterval: "15s" # Synchronize modifications from Vault in 15 seconds
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: native-db-secret # Name of the auto-generated Kubernetes secret
    creationPolicy: Owner
  data:
    - secretKey: db_password # Key mapped inside the Kubernetes Secret
      remoteRef:
        key: db # Path in Vault (secret/data/db)
        property: password # Key inside Vault secret
