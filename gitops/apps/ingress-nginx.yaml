apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: ingress-nginx
    repoURL: https://kubernetes.github.io/ingress-nginx
    targetRevision: 4.10.1 # Secure, stable NGINX Helm chart version
    helm:
      releaseName: ingress-nginx
      values: |
        controller:
          service:
            annotations:
              # Tells GCP to provision a Standard regional External Network Load Balancer
              cloud.google.com/load-balancer-type: "External"
          metrics:
            enabled: true
  destination:
    server: "https://kubernetes.default.svc"
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
