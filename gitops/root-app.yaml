apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # Replace 'YOUR_GITHUB_USERNAME' with your actual GitHub username
    repoURL: 'https://github.com/YOUR_GITHUB_USERNAME/gcp-idp-platform.git'
    targetRevision: HEAD
    path: gitops/apps
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
